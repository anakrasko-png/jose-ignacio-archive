    <style vid="5">
        :root {

            --grad-3: rgba(15, 25, 40, 0.78);

            --card-bg: #1a1e24;
            --card-shadow: rgba(0,0,0,0.28);

            --toggle-border: rgba(255,255,255,0.12);
            --toggle-bg: rgba(16, 18, 21, 0.78);
            --toggle-active-border: rgba(255,255,255,0.26);

        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-stack);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            isolation: isolate;
            transition: background-color 0.8s ease, color 0.8s ease;
        }

        .ambient-gradient {
            position: fixed;
            inset: -14%;
            z-index: -2;
            pointer-events: none;
            transition: opacity 2.4s ease;
        }

        .ambient-gradient.primary {
            background:
                radial-gradient(circle at 18% 22%, var(--grad-1) 0, transparent 42%),
                radial-gradient(circle at 78% 20%, var(--grad-2) 0, transparent 38%),
                radial-gradient(circle at 50% 72%, var(--grad-3) 0, transparent 48%);

        }

        .ambient-gradient.secondary {
            background:
                radial-gradient(circle at 16% 78%, var(--grad-alt-1) 0, transparent 36%),
                radial-gradient(circle at 78% 18%, var(--grad-alt-2) 0, transparent 32%),
                radial-gradient(circle at 52% 66%, var(--grad-alt-3) 0, transparent 46%),
                radial-gradient(circle at 84% 72%, var(--grad-alt-4) 0, transparent 28%);
            filter: blur(34px);
            animation: driftTwo 30s ease-in-out infinite alternate;
            opacity: 0.55;
        }

        .ambient-gradient.secondary.is-shifted {
            opacity: 0.9;
        }

        body.grid-mode {
            height: auto;
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            justify-content: flex-start;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 100;
            pointer-events: none;
            mix-blend-mode: multiply;
        }

        .brand {
            font-size: 11px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-weight: 600;
        }

        .meta {
            text-align: right;
            font-size: 10px;
            color: var(--text-sub);
            line-height: 1.4;
        }

        .gallery-viewport {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 40vh;
            perspective: 1200px;
            overflow: visible;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.grid-mode .gallery-viewport {
            position: relative;
            top: auto;
            left: auto;
            transform: none;
            width: 100%;

        .gallery-viewport:active {

        .strip-container {

        body.grid-mode .strip-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 18px;

            transform-style: flat;

        .card {
            position: absolute;
            top: 50%;

            margin-left: -100px;

            box-shadow: 0 10px 40px var(--card-shadow);

        body.grid-mode .card {
            position: relative;
            top: auto;
            left: auto;

            height: auto;

            opacity: 1 !important;

        .card img,
        .card video {

        .card:hover {

        .layout-toggle-container {

            opacity: 0.35;

            width: 18px;

        .audio-toggle.is-playing .icon-play {

        @media (max-width: 640px) {
            .layout-toggle-container {
                left: 50%;
                bottom: 28px;
                transform: translateX(-50%);
            }

            .audio-toggle {
                right: 20px;
                bottom: 28px;
            }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;

            background: var(--bg-color);

            display: flex;

            justify-content: center;

        .loader-text {
            font-size: 10px;

            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

    </style>

<body vid="6">

    <div class="overlay" id="overlay" vid="18">

    <script vid="20">
        const strip = document.getElementById('strip');
        const viewport = document.getElementById('viewport');
        const overlay = document.getElementById('overlay');
        const loaderText = document.querySelector('.loader-text');
        const weatherEl = document.getElementById('weather');
        const audioToggle = document.getElementById('audio-toggle');
        const toggleButtons = Array.from(document.querySelectorAll('.toggle-btn'));
        const ambientSecondary = document.getElementById('ambient-secondary');

        const cardWidth = 220;
        const visibleRange = 2000;
        const perspectiveDepth = 800;

        let galleryItems = [];
        let audioPaths = [];
        let cards = [];
        let currentAudioIndex = -1;
        let audioIntent = 'paused';
        let audioContext = null;
        const decodedAudioCache = new Map();
        let currentAudioBuffer = null;
        let currentAudioSource = null;
        let currentAudioGain = null;
        let currentAudioStartedAt = 0;
        let currentAudioOffset = 0;
        let queuedAudioBuffer = null;
        let queuedAudioIndex = -1;
        let audioTransitionTimer = null;
        let isCrossfading = false;
        let currentScroll = 0;
        let targetScroll = 0;
        let currentLayout = 'rotate';
        let currentIsDay = true;
        let lightGradientPalettes = [];
        let darkGradientPalettes = [];
        let activeGradientIndex = 0;
        let gradientCycleTimer = null;
        let isDragging = false;
        let startX = 0;
        let lastX = 0;
        let velocity = 0;
        let rafId;
        const audioFadeLeadSeconds = 4.5;
        const audioCrossfadeDurationMs = 3200;
        const audioCrossfadeDurationSeconds = audioCrossfadeDurationMs / 1000;

        async function loadGalleryItems() {
            const response = await fetch('/data/gallery.json', {
                cache: 'no-store'
            });
            if (!response.ok) {
                throw new Error(`Gallery request failed with ${response.status}`);
            }
            const data = await response.json();
            if (Array.isArray(data.items)) {
                return data.items
                    .map((item) => {
                        if (typeof item === 'string') {
                            return {
                                path: item,
                                type: /\.(mp4|mov|m4v)$/i.test(item) ? 'video' : 'image'
                            };
                        }

                        if (!item || typeof item.path !== 'string') {
                            return null;
                        }

                        return {
                            path: item.path,
                            type: item.type === 'video' ? 'video' : 'image'
                        };
                    })
                    .filter(Boolean);
            }

            if (Array.isArray(data.images)) {
                return data.images.map((path) => ({
                    path,
                    type: /\.(mp4|mov|m4v)$/i.test(path) ? 'video' : 'image'
                }));
            }

            return [];
        }

        async function loadWeather() {
            try {
                const response = await fetch('/api/weather', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`Weather request failed with ${response.status}`);
                }

                const data = await response.json();
                currentIsDay = data.isDay;
                applyThemeMode(currentIsDay);
                weatherEl.textContent = `${Math.round(data.temperatureC)}°C · ${data.summary} · Wind ${Math.round(data.windKmh)} km/h`;
            } catch (error) {
                console.error(error);
                weatherEl.textContent = 'Weather unavailable';
            }
        }

        async function loadAudioPaths() {
            const response = await fetch('/data/audio.json', {
                cache: 'no-store'
            });
            if (!response.ok) {
                throw new Error(`Audio request failed with ${response.status}`);
            }
            const data = await response.json();
            return Array.isArray(data.files) ? data.files : [];
        }

        async function refreshAudioSources() {
            const latestAudioPaths = await loadAudioPaths().catch((error) => {
                console.error(error);
                return audioPaths;
            });

            audioPaths = latestAudioPaths;

            if (!audioPaths.length) {
                clearAudioTransitionTimer();
                stopCurrentAudioNodes();
                currentAudioIndex = -1;
                queuedAudioIndex = -1;
                queuedAudioBuffer = null;
                currentAudioBuffer = null;
                currentAudioOffset = 0;
                audioIntent = 'paused';
                isCrossfading = false;
                updateAudioButton();
                return false;
            }

            if (currentAudioIndex >= audioPaths.length) {
                currentAudioIndex = 0;
            }

            updateAudioButton();
            return true;
        }

        function applyGradientPalette(palette, prefix = '--grad') {
            if (!palette || palette.length < 4) {
                return;
            }

            document.documentElement.style.setProperty(`${prefix}-1`, palette[0]);
            document.documentElement.style.setProperty(`${prefix}-2`, palette[1]);
            document.documentElement.style.setProperty(`${prefix}-3`, palette[2]);
            document.documentElement.style.setProperty(`${prefix}-4`, palette[3]);
        }

        function getCurrentGradientPalettes() {
            return currentIsDay ? lightGradientPalettes : darkGradientPalettes;
        }

        function crossfadeToGradient(index) {
            const palettes = getCurrentGradientPalettes();
            if (!palettes.length) {
                return;
            }

            const normalizedIndex = index % palettes.length;
            const palette = palettes[normalizedIndex];
            if (!palette) {
                return;
            }

            applyGradientPalette(palette.primary, '--grad');
            applyGradientPalette(palette.secondary, '--grad-alt');
            activeGradientIndex = normalizedIndex;

            ambientSecondary.classList.remove('is-shifted');
            requestAnimationFrame(() => {
                ambientSecondary.classList.add('is-shifted');
            });
        }

        function startGradientCycle() {
            if (gradientCycleTimer) {
                window.clearInterval(gradientCycleTimer);
            }

            const palettes = getCurrentGradientPalettes();
            if (palettes.length < 2) {
                return;
            }

            gradientCycleTimer = window.setInterval(() => {
                const nextIndex = (activeGradientIndex + 1) % palettes.length;
                crossfadeToGradient(nextIndex);
            }, 9000);
        }

        function applyThemeMode(isDay) {
            document.body.classList.toggle('night-mode', !isDay);
            const palettes = getCurrentGradientPalettes();
            if (palettes.length) {
                crossfadeToGradient(Math.min(activeGradientIndex, palettes.length - 1));
                startGradientCycle();
            }
        }

        function rgbToRgba(rgb, alpha) {
            return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;
        }

        function luminance(rgb) {
            return (0.2126 * rgb.r + 0.7152 * rgb.g + 0.0722 * rgb.b) / 255;
        }

        function averageImageColor(path) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d', { willReadFrequently: true });
                    const sampleSize = 24;
                    canvas.width = sampleSize;
                    canvas.height = sampleSize;
                    ctx.drawImage(img, 0, 0, sampleSize, sampleSize);
                    const { data } = ctx.getImageData(0, 0, sampleSize, sampleSize);

                    let r = 0;
                    let g = 0;
                    let b = 0;
                    let count = 0;

                    for (let i = 0; i < data.length; i += 4) {
                        const alpha = data[i + 3];
                        if (alpha < 20) continue;
                        r += data[i];
                        g += data[i + 1];
                        b += data[i + 2];
                        count += 1;
                    }

                    if (!count) {
                        resolve(null);
                        return;
                    }

                    resolve({
                        r: Math.round(r / count),
                        g: Math.round(g / count),
                        b: Math.round(b / count)
                    });
                };
                img.onerror = reject;
                img.src = encodeURI(path);
            });
        }

        function buildPaletteVariants(sourceColors, alphaSet) {
            if (!sourceColors.length) {
                return [];
            }

            const variants = [];
            const chunkCount = Math.min(4, Math.max(2, Math.ceil(sourceColors.length / 3)));
            const chunkSize = Math.max(1, Math.floor(sourceColors.length / chunkCount));

            for (let i = 0; i < chunkCount; i += 1) {
                const start = i * chunkSize;
                const slice = sourceColors.slice(start, start + chunkSize);
                const pool = slice.length ? slice : sourceColors;
                variants.push({
                    primary: [
                        rgbToRgba(pool[0] || sourceColors[0], alphaSet.primary[0]),
                        rgbToRgba(pool[Math.floor(pool.length / 3)] || pool[0] || sourceColors[0], alphaSet.primary[1]),
                        rgbToRgba(pool[Math.floor((pool.length * 2) / 3)] || pool[pool.length - 1] || sourceColors[0], alphaSet.primary[2]),
                        rgbToRgba(pool[pool.length - 1] || sourceColors[sourceColors.length - 1], alphaSet.primary[3])
                    ],
                    secondary: [
                        rgbToRgba(pool[pool.length - 1] || sourceColors[0], alphaSet.secondary[0]),
                        rgbToRgba(pool[Math.floor(pool.length / 2)] || pool[0] || sourceColors[0], alphaSet.secondary[1]),
                        rgbToRgba(pool[0] || sourceColors[0], alphaSet.secondary[2]),
                        rgbToRgba(sourceColors[(start + Math.floor(chunkSize / 2)) % sourceColors.length] || pool[0], alphaSet.secondary[3])
                    ]
                });
            }

            return variants;
        }

        async function deriveGradientPalettes(items) {
            const samplePaths = items
                .filter((item) => item.type === 'image')
                .map((item) => item.path)
                .slice(0, 36);
            const colors = (await Promise.all(
                samplePaths.map((path) =>
                    averageImageColor(path).catch(() => null)
                )
            )).filter(Boolean);

            if (!colors.length) {
                return;
            }

            const sorted = colors.sort((a, b) => luminance(b) - luminance(a));
            const bright = sorted.slice(0, Math.max(6, Math.min(12, sorted.length)));
            const dark = sorted.slice(-Math.max(6, Math.min(12, sorted.length)));

            lightGradientPalettes = buildPaletteVariants(bright, {
                primary: [0.56, 0.42, 0.62, 0.24],
                secondary: [0.36, 0.3, 0.4, 0.22]
            });

            darkGradientPalettes = buildPaletteVariants(dark.reverse(), {
                primary: [0.48, 0.34, 0.76, 0.18],
                secondary: [0.34, 0.28, 0.42, 0.16]
            });

            applyThemeMode(currentIsDay);
        }

        function updateAudioButton() {
            const isPlaying = audioIntent === 'playing';
            audioToggle.classList.toggle('is-playing', Boolean(isPlaying));
            audioToggle.setAttribute('aria-label', isPlaying ? 'Pause album audio' : 'Play album audio');
            audioToggle.setAttribute('title', isPlaying ? 'Pause album audio' : 'Play album audio');
            audioToggle.disabled = !audioPaths.length;
        }

        function chooseNextAudioIndex(baseIndex = currentAudioIndex) {
            if (!audioPaths.length) {
                return -1;
            }
            return (baseIndex + 1 + audioPaths.length) % audioPaths.length;
        }

        function ensureAudioContext() {
            if (!audioContext) {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) {
                    throw new Error('Web Audio API is unavailable in this browser');
                }
                audioContext = new AudioContextClass();
            }
            return audioContext;
        }

        function clearAudioTransitionTimer() {
            if (audioTransitionTimer) {
                window.clearTimeout(audioTransitionTimer);
                audioTransitionTimer = null;
            }
        }

        function stopCurrentAudioNodes() {
            [currentAudioSource, currentAudioGain].forEach((node) => {
                try {
                    node?.disconnect();
                } catch (error) {
                    console.error(error);
                }
            });
            try {
                currentAudioSource?.stop();
            } catch (error) {
                console.error(error);
            }
            currentAudioSource = null;
            currentAudioGain = null;
        }

        async function getDecodedAudioBuffer(index) {
            if (index < 0 || index >= audioPaths.length) {
                throw new Error('Audio index is out of range');
            }

            if (decodedAudioCache.has(index)) {
                return decodedAudioCache.get(index);
            }

            const response = await fetch(encodeURI(audioPaths[index]), { cache: 'force-cache' });
            if (!response.ok) {
                throw new Error(`Audio media request failed with ${response.status}`);
            }

            const arrayBuffer = await response.arrayBuffer();
            const context = ensureAudioContext();
            const decoded = await context.decodeAudioData(arrayBuffer.slice(0));
            decodedAudioCache.set(index, decoded);
            return decoded;
        }

        function getCurrentPlaybackOffset() {
            if (!currentAudioBuffer) {
                return 0;
            }

            if (!currentAudioSource || audioIntent !== 'playing') {
                return Math.min(currentAudioOffset, currentAudioBuffer.duration);
            }

            const elapsed = audioContext.currentTime - currentAudioStartedAt;
            return Math.min(currentAudioOffset + elapsed, currentAudioBuffer.duration);
        }

        function createPlaybackNodes(buffer, startOffset = 0, initialGain = 1) {
            const context = ensureAudioContext();
            const source = context.createBufferSource();
            const gain = context.createGain();
            source.buffer = buffer;
            source.connect(gain);
            gain.connect(context.destination);
            gain.gain.setValueAtTime(initialGain, context.currentTime);
            source.start(context.currentTime, Math.max(0, Math.min(startOffset, Math.max(0, buffer.duration - 0.01))));
            return { source, gain, startedAt: context.currentTime };
        }

        async function findPlayableAudio(startIndex) {
            if (!audioPaths.length) {
                throw new Error('No audio files are available');
            }

            for (let step = 0; step < audioPaths.length; step += 1) {
                const index = (startIndex + step) % audioPaths.length;
                try {
                    const buffer = await getDecodedAudioBuffer(index);
                    return { index, buffer };
                } catch (error) {
                    console.error(`Skipping unplayable audio source: ${audioPaths[index]}`, error);
                }
            }

            throw new Error('No playable audio tracks were found');
        }

        async function primeQueuedAudioBuffer() {
            if (audioPaths.length < 2 || currentAudioIndex < 0) {
                queuedAudioIndex = -1;
                queuedAudioBuffer = null;
                return;
            }

            const playable = await findPlayableAudio(chooseNextAudioIndex(currentAudioIndex));
            queuedAudioIndex = playable.index;
            queuedAudioBuffer = playable.buffer;
        }

        function scheduleNextTransition() {
            clearAudioTransitionTimer();

            if (!currentAudioBuffer || audioIntent !== 'playing') {
                return;
            }

            const remaining = currentAudioBuffer.duration - getCurrentPlaybackOffset();
            const delayMs = Math.max(0, (remaining - audioFadeLeadSeconds) * 1000);
            audioTransitionTimer = window.setTimeout(() => {
                crossfadeToNextAudio().catch((error) => {
                    console.error(error);
                });
            }, delayMs);
        }

        async function playCurrentAudio() {
            if (!currentAudioBuffer) {
                return;
            }

            audioIntent = 'playing';
            updateAudioButton();

            try {
                const context = ensureAudioContext();
                await context.resume();
                stopCurrentAudioNodes();
                const { source, gain, startedAt } = createPlaybackNodes(currentAudioBuffer, currentAudioOffset, 1);
                currentAudioSource = source;
                currentAudioGain = gain;
                currentAudioStartedAt = startedAt;
                source.onended = () => {
                    if (source !== currentAudioSource || isCrossfading || audioIntent !== 'playing') {
                        return;
                    }
                    crossfadeToNextAudio(0).catch((error) => {
                        console.error(error);
                    });
                };
                scheduleNextTransition();
                primeQueuedAudioBuffer().catch((error) => {
                    console.error(error);
                });
                updateAudioButton();
            } catch (error) {
                console.error(error);
                if (audioPaths.length > 1) {
                    await crossfadeToNextAudio(0);
                    return;
                }
                audioIntent = 'paused';
                updateAudioButton();
            }
        }

        function pauseCurrentAudio() {
            isCrossfading = false;
            clearAudioTransitionTimer();
            audioIntent = 'paused';
            currentAudioOffset = getCurrentPlaybackOffset();
            stopCurrentAudioNodes();
            updateAudioButton();
        }

        async function crossfadeToNextAudio(durationMs = audioCrossfadeDurationMs) {
            if (isCrossfading || !(await refreshAudioSources())) {
                audioIntent = 'paused';
                updateAudioButton();
                return;
            }

            if (!currentAudioBuffer || currentAudioIndex < 0) {
                const playable = await findPlayableAudio(0);
                currentAudioIndex = playable.index;
                currentAudioBuffer = playable.buffer;
                currentAudioOffset = 0;
                await playCurrentAudio();
                return;
            }

            const context = ensureAudioContext();
            await context.resume();

            isCrossfading = true;
            clearAudioTransitionTimer();

            if (queuedAudioIndex < 0 || !queuedAudioBuffer) {
                const playable = await findPlayableAudio(chooseNextAudioIndex(currentAudioIndex));
                queuedAudioIndex = playable.index;
                queuedAudioBuffer = playable.buffer;
            }

            try {
                const { source: incomingSource, gain: incomingGain, startedAt } = createPlaybackNodes(queuedAudioBuffer, 0, 0);
                const outgoingSource = currentAudioSource;
                const outgoingGain = currentAudioGain;

                incomingSource.onended = () => {
                    if (incomingSource !== currentAudioSource || isCrossfading || audioIntent !== 'playing') {
                        return;
                    }
                    crossfadeToNextAudio(0).catch((error) => {
                        console.error(error);
                    });
                };

                const now = context.currentTime;
                const fadeSeconds = durationMs / 1000;
                incomingGain.gain.setValueAtTime(0, now);
                incomingGain.gain.linearRampToValueAtTime(1, now + fadeSeconds);

                if (outgoingGain) {
                    outgoingGain.gain.cancelScheduledValues(now);
                    outgoingGain.gain.setValueAtTime(outgoingGain.gain.value, now);
                    outgoingGain.gain.linearRampToValueAtTime(0, now + fadeSeconds);
                }

                currentAudioSource = incomingSource;
                currentAudioGain = incomingGain;
                currentAudioBuffer = queuedAudioBuffer;
                currentAudioIndex = queuedAudioIndex;
                currentAudioOffset = 0;
                currentAudioStartedAt = startedAt;
                queuedAudioBuffer = null;
                queuedAudioIndex = -1;

                window.setTimeout(() => {
                    try {
                        outgoingSource?.stop();
                        outgoingSource?.disconnect();
                        outgoingGain?.disconnect();
                    } catch (error) {
                        console.error(error);
                    }
                }, durationMs + 120);
            } catch (error) {
                console.error(error);
                isCrossfading = false;
                const playable = await findPlayableAudio(chooseNextAudioIndex(currentAudioIndex));
                currentAudioIndex = playable.index;
                currentAudioBuffer = playable.buffer;
                currentAudioOffset = 0;
                await playCurrentAudio();
                return;
            }
            isCrossfading = false;
            scheduleNextTransition();
            primeQueuedAudioBuffer().catch((error) => {
                console.error(error);
            });
        }

        async function toggleAudioPlayback() {
            if (!(await refreshAudioSources())) {
                return;
            }

            if (audioIntent === 'playing') {
                pauseCurrentAudio();
                return;
            }

            try {
                ensureAudioContext();
            } catch (error) {
                console.error(error);
                audioIntent = 'paused';
                updateAudioButton();
                return;
            }

            if (!currentAudioBuffer || currentAudioIndex < 0) {
                const playable = await findPlayableAudio(0);
                currentAudioIndex = playable.index;
                currentAudioBuffer = playable.buffer;
                currentAudioOffset = 0;
            }

            await playCurrentAudio();
        }

        function buildCards() {
            strip.innerHTML = '';
            galleryItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                const media = item.type === 'video'
                    ? document.createElement('video')
                    : document.createElement('img');

                if (item.type === 'video') {
                    media.src = encodeURI(item.path);
                    media.muted = true;
                    media.loop = true;
                    media.autoplay = true;
                    media.playsInline = true;
                    media.setAttribute('aria-label', `Gallery video ${index + 1}`);
                } else {
                    media.src = encodeURI(item.path);
                    media.alt = `Gallery image ${index + 1}`;
                }

                card.appendChild(media);
                strip.appendChild(card);
                card.dataset.index = index;
            });
            cards = Array.from(document.querySelectorAll('.card'));
            applyLayout(currentLayout);
        }

        const autoScrollSpeed = 0.5;

        function animate() {
            if (currentLayout !== 'rotate') {
                rafId = null;
                return;
            }
            if (!cards.length) {
                rafId = requestAnimationFrame(animate);
                return;
            }

            if (!isDragging) {
                targetScroll += velocity;
                velocity *= 0.95;
                targetScroll += autoScrollSpeed;
            }

            currentScroll += (targetScroll - currentScroll) * 0.1;

            cards.forEach(card => {
                const index = parseInt(card.dataset.index);
                let virtualIndex = index * cardWidth - currentScroll;

                const totalSetWidth = galleryItems.length * cardWidth;
                while (virtualIndex < -totalSetWidth / 2) virtualIndex += totalSetWidth;
                while (virtualIndex > totalSetWidth / 2) virtualIndex -= totalSetWidth;

                if (Math.abs(virtualIndex) < window.innerWidth) {
                    card.style.display = 'block';

                    const progress = virtualIndex / (window.innerWidth / 1.5);
                    const x = virtualIndex;
                    const z = -Math.pow(Math.abs(progress), 2) * 500;
                    const rotateY = progress * 45;

                    card.style.transform = `
                        translateX(${x}px)
                        translateZ(${z}px)
                        rotateY(${rotateY}deg)
                    `;

                    card.style.opacity = 1 - Math.pow(Math.abs(progress), 3);
                } else {
                    card.style.display = 'none';
                }
            });

            rafId = requestAnimationFrame(animate);
        }

        function stopAnimation() {
            if (rafId) {
                cancelAnimationFrame(rafId);
                rafId = null;
            }
        }

        function applyLayout(layout) {
            currentLayout = layout;
            document.body.classList.toggle('grid-mode', layout === 'grid');

            toggleButtons.forEach((button) => {
                button.classList.toggle('active', button.dataset.layout === layout);
            });

            if (layout === 'grid') {
                stopAnimation();
                viewport.style.cursor = 'default';
                cards.forEach((card) => {
                    card.style.display = 'block';
                    card.style.transform = 'none';
                    card.style.opacity = '1';
                });
                return;
            }

            viewport.style.cursor = isDragging ? 'grabbing' : 'grab';
            if (!rafId) {
                animate();
            }
        }

        async function initializeGallery() {
            try {
                [galleryItems, audioPaths] = await Promise.all([
                    loadGalleryItems(),
                    loadAudioPaths().catch((error) => {
                        console.error(error);
                        return [];
                    })
                ]);
                if (!galleryItems.length) {
                    loaderText.textContent = 'NO MEDIA FOUND IN GALLERY FOLDER';
                    overlay.style.opacity = 1;
                    return;
                }

                audioToggle.disabled = audioPaths.length === 0;
                updateAudioButton();
                deriveGradientPalettes(galleryItems).catch((error) => {
                    console.error(error);
                });
                buildCards();
                setTimeout(() => {
                    overlay.style.opacity = 0;
                    applyLayout(currentLayout);
                }, 1000);
            } catch (error) {
                console.error(error);
                loaderText.textContent = 'GALLERY FAILED TO LOAD';
                overlay.style.opacity = 1;
            }
        }

        viewport.addEventListener('mousedown', (e) => {
            if (currentLayout !== 'rotate') return;
            isDragging = true;
            startX = e.clientX;
            lastX = e.clientX;
            viewport.style.cursor = 'grabbing';
            velocity = 0;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            viewport.style.cursor = currentLayout === 'rotate' ? 'grab' : 'default';
        });

        window.addEventListener('mousemove', (e) => {
            if (currentLayout !== 'rotate') return;
            if (!isDragging) return;

            const delta = e.clientX - lastX;
            lastX = e.clientX;
            targetScroll -= delta * 1.5;
            velocity = -delta * 0.5;
        });

        viewport.addEventListener('touchstart', (e) => {
            if (currentLayout !== 'rotate') return;
            isDragging = true;
            startX = e.touches[0].clientX;
            lastX = e.touches[0].clientX;
            velocity = 0;
        });

        window.addEventListener('touchend', () => {
            isDragging = false;
        });

        window.addEventListener('touchmove', (e) => {
            if (currentLayout !== 'rotate') return;
            if (!isDragging) return;
            const x = e.touches[0].clientX;
            const delta = x - lastX;
            lastX = x;
            targetScroll -= delta * 1.5;
            velocity = -delta * 0.5;
        });

        toggleButtons.forEach((button) => {
            button.addEventListener('click', () => {
                applyLayout(button.dataset.layout);
            });
        });

        audioToggle.addEventListener('click', () => {
            toggleAudioPlayback();
        });

        initializeGallery();
        loadWeather();
    </script>

</body></html>
